[pytest]
markers =
    external: tests that require external network or third-party services
    auth: tests that require authentication flow (token issuance)
    unit: pure unit tests with isolated dependencies
filterwarnings =
    ignore:datetime\.datetime\.utcfromtimestamp\(\) is deprecated.*:DeprecationWarning:pytz\.tzinfo
    ignore:'crypt' is deprecated.*:DeprecationWarning:passlib\.utils
    ignore:The 'app' shortcut is now deprecated.*:DeprecationWarning:httpx\._client
    ignore:datetime\.datetime\.utcnow\(\) is deprecated.*:DeprecationWarning:jose\.jwt
